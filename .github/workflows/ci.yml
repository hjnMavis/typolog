name: CI

# 모든 PR과 main push에서 lint / type-check / test를 자동 검증한다.
# pull_request는 base 무관 전체 실행 — 스택 PR(U2가 U1 위 등)을 base 재타깃 전에도 검증하고,
# main으로 retarget 시 CI 미트리거 사각지대를 없앤다 (Day 3 "main 대상만" 결정 개정, 2026-06-16).
# (roadmap 4-6을 Phase 2 작업 안정성을 위해 앞당겨 도입)
on:
  push:
    branches: [main]
  pull_request:

# 같은 브랜치에서 새 푸시가 오면 진행 중인 실행을 취소 (CI 분 절약)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · type-check · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Test
        run: pnpm test:run
